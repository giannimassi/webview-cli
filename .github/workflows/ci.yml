name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Set up Node (for runtime JS smoke harness)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dev deps (jsdom for runtime smoke)
        run: npm install --no-audit --no-fund --silent

      - name: Build
        run: make build

      - name: Verify binary size under 500KB
        run: |
          SIZE=$(stat -f%z webview-cli)
          echo "Binary size: $SIZE bytes"
          # Budget history: 193KB (v0.1.x) -> ~290KB (markdown editor) ->
          # ~348KB (--editor mode: file tree, syntax highlighter, link routing,
          # frontmatter + comments) -> ~450KB (editor runtime + folder browser).
          # 500KB leaves headroom for the embedded UI JS while still being
          # ~100x smaller than an Electron equivalent.
          if [ "$SIZE" -gt 512000 ]; then
            echo "Binary exceeds 500KB budget"
            exit 1
          fi

      - name: Smoke tests
        run: make test

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: webview-cli-darwin-arm64
          path: webview-cli
          retention-days: 30
